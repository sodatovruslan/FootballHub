<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FootballHub</title>

    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark navbar-expand-lg">
    <div class="container">

        <a class="navbar-brand" href="/">⚽ FootballHub</a>
{% if user.is_authenticated %}

    <span style="color:white; margin-right:10px;">
        {{ user.username }}
    </span>

    <a href="{% url 'profile' %}" style="color:white; margin-right:10px;">
        Profile
    </a>

    <a href="{% url 'logout' %}" style="color:white;">
        Logout
    </a>

{% else %}

    <a href="{% url 'login' %}" style="color:white; margin-right:10px;">
        Login
    </a>

    <a href="{% url 'register' %}" style="color:white;">
        Register
    </a>

{% endif %}
        <div class="navbar-nav">

            <a class="nav-link" href="/teams/">Teams</a>
            <a class="nav-link" href="/players/">Players</a>
            <a class="nav-link" href="/matches/">Matches</a>

        </div>

    </div>
</nav>

<!-- CONTENT -->
<div class="container mt-4">

    {% block content %}
    {% endblock content %}

</div>

</body>
</html>
