{% extends 'base.html' %}

{% block content %}

<h1>Register</h1>

{% if error %}
<div class="alert alert-danger">
    {{ error }}
</div>
{% endif %}

<form method="post">
    {% csrf_token %}

    {{ form.as_p }}

    <button type="submit" class="btn btn-success">
        Register
    </button>
</form>

<p class="mt-3">
    Already have an account?
    <a href="{% url 'login' %}">Login</a>
</p>

{% endblock %}
