{% extends 'base.html' %}

{% block content %}
<style>
    .auth-card {
        background: linear-gradient(145deg, rgba(20, 20, 30, 0.95), rgba(40, 40, 50, 0.95));
        border: 2px solid rgba(0, 212, 255, 0.3);
        border-radius: 25px;
        padding: 40px;
        max-width: 500px;
        margin: 0 auto;
        box-shadow: 0 15px 50px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
    }

    .auth-card h1 {
        background: linear-gradient(90deg, #00d4ff, #7b2cbf);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        font-size: 2.5rem;
        font-weight: 800;
        text-align: center;
        margin-bottom: 30px;
    }

    .form-control {
        background: rgba(255, 255, 255, 0.05);
        border: 2px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        padding: 15px;
        color: #fff;
        transition: all 0.3s ease;
    }

    .form-control:focus {
        background: rgba(255, 255, 255, 0.1);
        border-color: #00d4ff;
        box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
    }

    .form-control::placeholder {
        color: rgba(255, 255, 255, 0.5);
    }

    .form-label {
        color: rgba(255, 255, 255, 0.8);
        font-weight: 600;
        margin-bottom: 8px;
    }

    .btn-primary-gradient {
        background: linear-gradient(135deg, #00d4ff, #7b2cbf);
        border: none;
        color: #fff;
        padding: 15px 30px;
        border-radius: 12px;
        font-weight: 700;
        font-size: 1.1rem;
        width: 100%;
        transition: all 0.3s ease;
    }

    .btn-primary-gradient:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 30px rgba(0, 212, 255, 0.4);
    }

    .auth-link {
        color: #00d4ff;
        text-decoration: none;
        font-weight: 600;
        transition: all 0.3s ease;
    }

    .auth-link:hover {
        color: #7b2cbf;
        text-decoration: underline;
    }
</style>

<div class="auth-card">
    <h1>📝 Register</h1>

    {% if error %}
    <div class="alert alert-danger" style="background: rgba(255, 50, 50, 0.2); border: 2px solid rgba(255, 50, 50, 0.5); border-radius: 12px; color: #fff;">
        {{ error }}
    </div>
    {% endif %}

    <form method="post">
        {% csrf_token %}

        <div class="mb-3">
            <label for="id_username" class="form-label">Username</label>
            <input type="text" name="username" class="form-control" id="id_username" placeholder="Enter username" required>
        </div>

        <div class="mb-3">
            <label for="id_email" class="form-label">Email</label>
            <input type="email" name="email" class="form-control" id="id_email" placeholder="Enter email" required>
        </div>

        <div class="mb-3">
            <label for="id_password1" class="form-label">Password</label>
            <input type="password" name="password1" class="form-control" id="id_password1" placeholder="Enter password" required>
        </div>

        <div class="mb-3">
            <label for="id_password2" class="form-label">Confirm Password</label>
            <input type="password" name="password2" class="form-control" id="id_password2" placeholder="Confirm password" required>
        </div>

        <button type="submit" class="btn btn-primary-gradient mt-4">
            Register
        </button>
    </form>

    <p class="mt-4 text-center" style="color: rgba(255, 255, 255, 0.7);">
        Already have an account?
        <a href="{% url 'login' %}" class="auth-link">Login</a>
    </p>
</div>
{% endblock %}
