{% extends 'base.html' %}

{% block content %}

<h1>Login</h1>

{% if error %}
<div class="alert alert-danger">
    {{ error }}
</div>
{% endif %}

<form method="post">
    {% csrf_token %}

    {{ form.as_p }}

    <button type="submit" class="btn btn-primary">
        Login
    </button>
</form>

<p class="mt-3">
    <a href="{% url 'forgot_password' %}">
        Forgot password?
    </a>
</p>

<p>
    No account?
    <a href="{% url 'register' %}">
        Register
    </a>
</p>

{% endblock %}
