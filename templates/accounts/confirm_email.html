{% extends 'base.html' %}

{% block content %}
<style>
    .code-display {
        background: linear-gradient(135deg, rgba(0, 212, 255, 0.2), rgba(123, 44, 191, 0.2));
        border: 2px solid rgba(0, 212, 255, 0.5);
        border-radius: 15px;
        padding: 20px;
        margin: 20px 0;
        text-align: center;
    }

    .info-text {
        color: rgba(255, 255, 255, 0.8);
        font-size: 1.1rem;
        line-height: 1.6;
    }
</style>

<div class="glass-card">
    <h1 class="text-center mb-4">Confirm Email</h1>

    <div class="code-display">
        <p class="info-text">
            📧 A confirmation code has been sent to your email address.<br>
            Please check your inbox and enter the 6-digit code below.
        </p>
    </div>

    {% if error %}
        <div class="alert alert-danger">
            {{ error }}
        </div>
    {% endif %}

    <form method="post">
        {% csrf_token %}

        <input
            type="hidden"
            name="username"
            value="{{ username }}"
        >

        <div class="mb-3">
            <label for="id_code" class="form-label">Enter confirmation code:</label>
            <input
                type="text"
                name="code"
                class="form-control"
                id="id_code"
                placeholder="Enter 6-digit code"
                maxlength="6"
                style="font-size: 1.5rem; letter-spacing: 5px; text-align: center;"
                required
            >
        </div>

        <button type="submit" class="btn btn-primary-gradient w-100">
            Confirm
        </button>
    </form>
</div>
{% endblock %}
