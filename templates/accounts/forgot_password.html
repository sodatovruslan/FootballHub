{% extends 'base.html' %}

{% block content %}

<h1>Forgot Password</h1>

{% if error %}
<div class="alert alert-danger">
    {{ error }}
</div>
{% endif %}

<form method="post">
    {% csrf_token %}

    {{ form.as_p }}

    <button type="submit" class="btn btn-warning">
        Send Code
    </button>

</form>

{% endblock %}
