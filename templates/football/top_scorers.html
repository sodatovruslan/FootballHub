{% extends 'base.html' %}

{% block content %}
<style>
    .scorer-card {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 20px;
        padding: 25px;
        margin-bottom: 20px;
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
    }

    .scorer-card::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
        transition: left 0.5s ease;
    }

    .scorer-card:hover::before {
        left: 100%;
    }

    .scorer-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 15px 40px rgba(0, 212, 255, 0.3);
        border-color: rgba(0, 212, 255, 0.5);
    }

    .position-badge {
        width: 50px;
        height: 50px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.5rem;
        font-weight: 700;
        background: linear-gradient(135deg, #00d4ff, #7b2cbf);
        box-shadow: 0 5px 20px rgba(0, 212, 255, 0.4);
    }

    .position-1 {
        background: linear-gradient(135deg, #ffd700, #ffaa00);
        box-shadow: 0 5px 20px rgba(255, 215, 0, 0.5);
    }

    .position-2 {
        background: linear-gradient(135deg, #c0c0c0, #a0a0a0);
        box-shadow: 0 5px 20px rgba(192, 192, 192, 0.5);
    }

    .position-3 {
        background: linear-gradient(135deg, #cd7f32, #b87333);
        box-shadow: 0 5px 20px rgba(205, 127, 50, 0.5);
    }

    .player-name {
        font-size: 1.3rem;
        font-weight: 600;
        background: linear-gradient(90deg, #00d4ff, #7b2cbf);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }

    .team-name {
        color: rgba(255, 255, 255, 0.7);
        font-size: 0.95rem;
    }

    .goals-count {
        font-size: 2.5rem;
        font-weight: 700;
        background: linear-gradient(90deg, #00d4ff, #7b2cbf);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }

    .goals-label {
        color: rgba(255, 255, 255, 0.6);
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 2px;
    }

    @media (max-width: 768px) {
        .scorer-card {
            padding: 20px;
        }

        .position-badge {
            width: 40px;
            height: 40px;
            font-size: 1.2rem;
        }

        .player-name {
            font-size: 1.1rem;
        }

        .goals-count {
            font-size: 2rem;
        }
    }
</style>

<div class="glass-card">
    <h1 class="text-center mb-5">🏆 Top Scorers</h1>

    <div class="row">
        {% for scorer in scorers %}
            <div class="col-md-6 col-lg-4 mb-4">
                <div class="scorer-card">
                    <div class="d-flex align-items-center justify-content-between">
                        <div class="d-flex align-items-center gap-3">
                            <div class="position-badge {% if forloop.counter == 1 %}position-1{% elif forloop.counter == 2 %}position-2{% elif forloop.counter == 3 %}position-3{% endif %}">
                                {{ forloop.counter }}
                            </div>
                            <div>
                                <div class="player-name">{{ scorer.player__full_name }}</div>
                                <div class="team-name">{{ scorer.player__team__name }}</div>
                            </div>
                        </div>
                        <div class="text-center">
                            <div class="goals-count">{{ scorer.goals }}</div>
                            <div class="goals-label">Goals</div>
                        </div>
                    </div>
                </div>
            </div>
        {% endfor %}
    </div>

    {% if not scorers %}
        <div class="text-center text-muted py-5">
            <p>No scorers data available yet.</p>
        </div>
    {% endif %}
</div>
{% endblock %}
