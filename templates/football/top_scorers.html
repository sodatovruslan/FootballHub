{% extends 'base.html' %}

{% block content %}

<h1>🏆 Top Scorers</h1>

<table border="1">

<tr>
    <th>#</th>
    <th>Player</th>
    <th>Team</th>
    <th>Goals</th>
</tr>

{% for scorer in scorers %}

<tr>
    <td>{{ forloop.counter }}</td>
    <td>{{ scorer.player__full_name }}</td>
    <td>{{ scorer.player__team__name }}</td>
    <td>{{ scorer.goals }}</td>
</tr>

{% endfor %}

</table>

{% endblock %}
