{% extends 'base.html' %}

{% block content %}

<h1>League Table</h1>

<table class="table table-striped">

    <thead>
        <tr>
            <th>Team</th>
            <th>P</th>
            <th>W</th>
            <th>D</th>
            <th>L</th>
            <th>GF</th>
            <th>GA</th>
            <th>Points</th>
        </tr>
    </thead>

    <tbody>
        {% for row in table %}
        <tr>
            <td>{{ row.team.name }}</td>
            <td>{{ row.played }}</td>
            <td>{{ row.wins }}</td>
            <td>{{ row.draws }}</td>
            <td>{{ row.losses }}</td>
            <td>{{ row.goals_for }}</td>
            <td>{{ row.goals_against }}</td>
            <td><b>{{ row.points }}</b></td>
        </tr>
        {% endfor %}
    </tbody>

</table>

{% endblock content %}
