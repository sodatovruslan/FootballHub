{% extends 'base.html' %}

{% block content %}

<h1>Match Detail</h1>

<h2>
    {{ match.home_team }} {{ match.home_score }} : {{ match.away_score }} {{ match.away_team }}
</h2>

<p>Tournament: {{ match.tournament.name }}</p>
<p>Date: {{ match.date }}</p>


<a href="{% url 'match_update' match.pk %}"
   class="btn btn-warning">
    Update
</a>

<a href="{% url 'match_delete' match.pk %}"
   class="btn btn-danger">
    Delete
</a>

{% endblock content %}
