{% extends 'base.html' %}

{% block content %}

<h1>{{ player.full_name }}</h1>

<p>Team: {{ player.team.name }}</p>
<p>Age: {{ player.age }}</p>
<p>Number: {{ player.number }}</p>
<p>Position: {{ player.position }}</p>


<a href="{% url 'player_update' player.pk %}" class="btn btn-warning">
    Update
</a>

<a href="{% url 'player_delete' player.pk %}" class="btn btn-danger">
    Delete
</a>

{% endblock content %}
